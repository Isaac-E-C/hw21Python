<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SER SALUD - Terapia Física</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">SER SALUD</div>
    <div class="nav-links">
      <a href="#" data-section="dashboard" class="active">Dashboard</a>
      <a href="#" data-section="appointments">Citas</a>
      <a href="#" data-section="create">Nueva Cita</a>
    </div>
  </nav>

  <div class="container">
    <section id="dashboard" class="section active">
      <h1>Panel de Control</h1>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="stat-total">0</div>
          <div class="stat-label">Total Citas</div>
        </div>
        <div class="stat-card pending">
          <div class="stat-number" id="stat-pending">0</div>
          <div class="stat-label">Pendientes</div>
        </div>
        <div class="stat-card confirmed">
          <div class="stat-number" id="stat-confirmed">0</div>
          <div class="stat-label">Confirmadas</div>
        </div>
        <div class="stat-card completed">
          <div class="stat-number" id="stat-completed">0</div>
          <div class="stat-label">Completadas</div>
        </div>
        <div class="stat-card cancelled">
          <div class="stat-number" id="stat-cancelled">0</div>
          <div class="stat-label">Canceladas</div>
        </div>
      </div>
      <div class="card">
        <h2>Acciones Rápidas</h2>
        <div class="quick-actions">
          <button class="btn btn-primary" onclick="navigateTo('create')">Nueva Cita</button>
          <button class="btn btn-secondary" onclick="navigateTo('appointments')">Ver Citas</button>
          <button class="btn btn-warning" onclick="seedDatabase()">Poblar Base de Datos</button>
        </div>
      </div>
    </section>

    <section id="appointments" class="section">
      <div class="section-header">
        <h1>Gestión de Citas</h1>
        <button class="btn btn-primary" onclick="navigateTo('create')">+ Nueva Cita</button>
      </div>
      <div class="card filters">
        <div class="filter-group">
          <input type="text" id="filter-status" placeholder="Estado (ej: pending,confirmed)" title="Filtrar por estado">
          <input type="date" id="filter-date" title="Filtrar por fecha">
          <input type="text" id="filter-patient" placeholder="ID Paciente" title="Filtrar por paciente">
          <input type="text" id="filter-doctor" placeholder="ID Doctor" title="Filtrar por doctor">
          <button class="btn btn-primary" onclick="loadAppointments()">Filtrar</button>
          <button class="btn btn-secondary" onclick="clearFilters()">Limpiar</button>
        </div>
      </div>
      <div id="appointments-list" class="appointments-list"></div>
    </section>

    <section id="create" class="section">
      <h1>Nueva Cita</h1>
      <div class="card">
        <form id="create-form" onsubmit="createAppointment(event)">
          <div class="form-group">
            <label for="doctor-select">Doctor</label>
            <select id="doctor-select" required>
              <option value="">Seleccione un doctor</option>
            </select>
          </div>
          <div class="form-group">
            <label for="therapy-select">Terapia</label>
            <select id="therapy-select" required>
              <option value="">Seleccione una terapia</option>
            </select>
          </div>
          <div class="form-group">
            <label for="appointment-date">Fecha</label>
            <input type="date" id="appointment-date" required>
          </div>
          <div class="form-group">
            <label for="appointment-time">Horario</label>
            <select id="appointment-time" required>
              <option value="">Seleccione fecha y doctor primero</option>
            </select>
          </div>
          <div class="form-group">
            <label for="symptoms">Síntomas</label>
            <textarea id="symptoms" rows="3" required minlength="10" placeholder="Describa sus síntomas (mín. 10 caracteres)"></textarea>
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="has-exams"> ¿Tiene exámenes?
            </label>
          </div>
          <div class="form-group" id="exams-group" style="display:none">
            <label for="exams">Exámenes (separados por coma)</label>
            <input type="text" id="exams" placeholder="Ej: Radiografía, Resonancia">
          </div>
          <button type="submit" class="btn btn-primary btn-block">Crear Cita</button>
        </form>
      </div>
    </section>

    <section id="detail" class="section">
      <h1>Detalle de Cita</h1>
      <button class="btn btn-secondary back-btn" onclick="navigateTo('appointments')">&larr; Volver</button>
      <div id="detail-content"></div>
    </section>

    <section id="edit" class="section">
      <h1>Actualizar Cita</h1>
      <button class="btn btn-secondary back-btn" onclick="navigateTo('appointments')">&larr; Volver</button>
      <div class="card">
        <form id="edit-form" onsubmit="updateAppointment(event)">
          <input type="hidden" id="edit-id">
          <div class="form-group">
            <label for="edit-status">Estado</label>
            <select id="edit-status">
              <option value="">Seleccione...</option>
              <option value="pending">Pendiente</option>
              <option value="confirmed">Confirmada</option>
              <option value="completed">Completada</option>
              <option value="cancelled">Cancelada</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit-doctor-notes">Notas del Doctor</label>
            <textarea id="edit-doctor-notes" rows="4" placeholder="Notas médicas..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Actualizar Cita</button>
        </form>
      </div>
    </section>
  </div>

  <div id="modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Cancelar Cita</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="cancel-id">
        <div class="form-group">
          <label for="cancel-reason">Motivo de Cancelación</label>
          <textarea id="cancel-reason" rows="3" placeholder="Describa el motivo..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
        <button class="btn btn-danger" onclick="confirmCancel()">Cancelar Cita</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
